<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="12" fill="#0A0B0D"/>
  <!-- Top fold line -->
  <path d="M48 8 L56 8 L56 16" stroke="#1F2126" stroke-width="1.25" stroke-linejoin="round" fill="none"/>
  <!-- A4 paper -->
  <path d="M14 10 H46 A2 2 0 0 1 48 12 V44 A2 2 0 0 1 46 46 H18 A2 2 0 0 1 16 44 V12 A2 2 0 0 1 18 10 Z" fill="#FAFAFA" stroke="#0A0B0D" stroke-width="1"/>
  <!-- Folded corner -->
  <path d="M48 10 V16 A0 0 0 0 1 48 16 H42 A2 2 0 0 1 40 14 V10 Z" fill="#E5E7EB"/>
  <!-- Invoice header bar -->
  <rect x="20" y="15" width="16" height="2.2" rx="0.6" fill="#0A0B0D"/>
  <!-- Header text lines -->
  <rect x="20" y="20" width="8" height="1.4" rx="0.4" fill="#9CA3AF"/>
  <rect x="32" y="20" width="12" height="1.4" rx="0.4" fill="#9CA3AF"/>
  <!-- Table rows -->
  <rect x="20" y="25" width="24" height="1.2" rx="0.4" fill="#E5E7EB"/>
  <rect x="20" y="28" width="20" height="1.2" rx="0.4" fill="#E5E7EB"/>
  <rect x="20" y="31" width="22" height="1.2" rx="0.4" fill="#E5E7EB"/>
  <!-- Total row (accent) -->
  <rect x="20" y="35" width="12" height="2" rx="0.6" fill="#0A0B0D"/>
  <rect x="34" y="35" width="10" height="2" rx="0.6" fill="#32F08C"/>
  <!-- Printer body -->
  <rect x="10" y="46" width="40" height="10" rx="2" fill="#1F2126" stroke="#32F08C" stroke-width="1"/>
  <!-- Paper output slot -->
  <rect x="14" y="48.5" width="32" height="1.2" rx="0.6" fill="#32F08C"/>
  <!-- Printer feet -->
  <rect x="13" y="56" width="4" height="3" rx="0.8" fill="#0A0B0D"/>
  <rect x="43" y="56" width="4" height="3" rx="0.8" fill="#0A0B0D"/>
  <!-- Status LED -->
  <circle cx="45" cy="51" r="0.9" fill="#32F08C"/>
  <!-- Print motion lines -->
  <path d="M20 60 H26" stroke="#32F08C" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <path d="M30 60 H36" stroke="#32F08C" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <path d="M40 60 H44" stroke="#32F08C" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
</svg>
